apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  namespace: messenger
  labels:
    app.kubernetes.io/name: main-app
    app.kubernetes.io/part-of: messenger-backend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: main-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: main-app
        app.kubernetes.io/part-of: messenger-backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: main-app
          image: messenger/main-app:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: messenger-config
            - secretRef:
                name: messenger-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 1
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 1
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: main-app
  namespace: messenger
  labels:
    app.kubernetes.io/name: main-app
    app.kubernetes.io/part-of: messenger-backend
spec:
  selector:
    app.kubernetes.io/name: main-app
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 8082
      targetPort: grpc

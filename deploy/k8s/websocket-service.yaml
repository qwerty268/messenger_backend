apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-service
  namespace: messenger
  labels:
    app.kubernetes.io/name: websocket-service
    app.kubernetes.io/part-of: messenger-backend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: websocket-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: websocket-service
        app.kubernetes.io/part-of: messenger-backend
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 5; done']
      containers:
        - name: websocket-service
          image: messenger/websocket-service:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8083
          envFrom:
            - configMapRef:
                name: messenger-config
            - secretRef:
                name: messenger-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 1
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 1
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-service
  namespace: messenger
  labels:
    app.kubernetes.io/name: websocket-service
    app.kubernetes.io/part-of: messenger-backend
spec:
  selector:
    app.kubernetes.io/name: websocket-service
  ports:
    - name: http
      port: 8083
      targetPort: http

---
# ============================================================
# MongoDB init script ConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-script
  namespace: messenger
  labels:
    app: mongodb
    app.kubernetes.io/part-of: messenger-backend
data:
  init-mongo.js: |
    db = db.getSiblingDB('admin');
    db.auth('root', 'root');

    db = db.getSiblingDB('files');
    db.createUser({
        user: 'user',
        pwd: 'user',
        roles: [
            {
                role: 'readWrite',
                db: 'files',
            },
        ],
    });

    db.createCollection('mongodb_docker');
---
# ============================================================
# PostgreSQL
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: messenger
  labels:
    app: postgres
    app.kubernetes.io/part-of: messenger-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: messenger-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: messenger-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: messenger-config
                  key: POSTGRES_DB
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: messenger
  labels:
    app: postgres
    app.kubernetes.io/part-of: messenger-backend
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# ============================================================
# RabbitMQ
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: messenger
  labels:
    app: rabbitmq
    app.kubernetes.io/part-of: messenger-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: messenger-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: messenger-secrets
                  key: RABBITMQ_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: messenger
  labels:
    app: rabbitmq
    app.kubernetes.io/part-of: messenger-backend
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
# ============================================================
# MongoDB
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: messenger
  labels:
    app: mongodb
    app.kubernetes.io/part-of: messenger-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: messenger-secrets
                  key: RABBITMQ_PASSWORD
            - name: MONGO_INITDB_DATABASE
              value: files
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: mongodb-init-script
              mountPath: /docker-entrypoint-initdb.d/init-mongo.js
              subPath: init-mongo.js
      volumes:
        - name: mongodb-init-script
          configMap:
            name: mongodb-init-script
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: messenger
  labels:
    app: mongodb
    app.kubernetes.io/part-of: messenger-backend
spec:
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017

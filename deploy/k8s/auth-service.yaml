apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: messenger
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: messenger-backend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/part-of: messenger-backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: auth-service
          image: messenger/auth-service:latest
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 8081
            - name: metrics
              containerPort: 8087
          envFrom:
            - configMapRef:
                name: messenger-config
            - secretRef:
                name: messenger-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: grpc
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 1
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 1
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: messenger
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: messenger-backend
spec:
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - name: grpc
      port: 8081
      targetPort: grpc
    - name: metrics
      port: 8087
      targetPort: metrics

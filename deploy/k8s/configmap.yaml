apiVersion: v1
kind: ConfigMap
metadata:
  name: messenger-config
  namespace: messenger
  labels:
    app.kubernetes.io/name: messenger-config
    app.kubernetes.io/part-of: messenger-backend
data:
  APP_ENV: "dev"
  MAIN_APP_HTTP_PORT: "8080"
  MAIN_APP_GRPC_PORT: "8082"
  AUTH_SERVICE_GRPC_PORT: "8081"
  AUTH_SERVICE_METRICS_PORT: "8087"
  WEBSOCKET_SERVICE_HTTP_PORT: "8083"
  MAIN_APP_HTTP_ADDR: ":8080"
  MAIN_APP_GRPC_ADDR: ":8082"
  AUTH_SERVICE_GRPC_ADDR: ":8081"
  AUTH_SERVICE_METRICS_ADDR: ":8087"
  WEBSOCKET_SERVICE_HTTP_ADDR: ":8083"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "patefon"
  POSTGRES_SSLMODE: "disable"
  POSTGRES_POOL_MAX_CONNS: "10"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"
  MONGODB_HOST: "mongodb"
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: "files"
  MONGODB_AUTH_SOURCE: "files"
  AUTH_SERVICE_HOST: "auth-service"
  AUTH_SERVICE_PORT: "8081"
  UPLOADS_PATH: "/uploads"
